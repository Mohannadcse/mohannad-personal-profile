# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: blank
first_name: Mohannad
middle_name:
last_name: Alhanahnah
contact_note:
description: >
  Software Security Researcher & Entrepreneur | AI and Software Supply Chain Security
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with
  <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: software security, supply chain security, AI security, LLM, IoT, software debloating
lang: en
icon: 🔒

url: https://mohannadcse.github.io
baseurl: ""
last_updated: false
impressum_path:
back_to_top: true

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: true
  theme_light: flat
  theme_dark: gitdimmed

external_services:
  github_readme_stats_url: https://github-readme-stats.vercel.app
  github_profile_trophy_url: https://github-profile-trophy.vercel.app

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true
search_enabled: false
socials_in_search: false
posts_in_search: false
bib_search: false

max_width: 960px

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------

serve_og_meta: true
serve_schema_org: true
og_image:

# -----------------------------------------------------------------------------
# Analytics
# -----------------------------------------------------------------------------

google_analytics: # replace with G-XXXXXXXXXX once you have a GA4 property
google_site_verification:
bing_site_verification:

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name: Mohannad's Blog
blog_description: Security research, tools, and insights
permalink: /blog/:year/:title/
lsi: false

related_blog_posts:
  enabled: true
  max_related: 5

giscus:
  repo: Mohannadcse/mohannad-personal-profile
  repo_id:
  category: Comments
  category_id:
  mapping: title
  strict: 1
  reactions_enabled: 1
  input_position: bottom
  dark_theme: dark
  light_theme: light
  emit_metadata: 0

disqus_shortname:

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: false
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/
  teachings:
    output: true
    permalink: /teachings/:path/
  books:
    output: true
    permalink: /books/:path/

announcements:
  enabled: true
  scrollable: true
  limit: 5

latest_posts:
  enabled: true
  scrollable: true
  limit: 3

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - bin/
  - CLAUDE.md
  - README.md
  - requirements.txt

keep_files:
  - .git
  - .github

sass:
  style: compressed

plugins:
  - jekyll-archives-v2
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll-scholar
  - jekyll-sitemap
  - jekyll-socials
  - jekyll-tabs
  - jekyll-toc
  - jemoji

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------

scholar:
  last_name: [Alhanahnah]
  first_name: [Mohannad]
  style: apa
  locale: en
  source: ./_bibliography
  bibliography: papers.bib
  bibliography_template: bib
  bibliography_list_tag: ul
  bibtex_skip_fields: [abstract, award, award_name, html, pdf, note, video, code, poster, slides, supp, website, selected, altmetric]
  sort_by: year
  order: descending
  query: "@*"
  group_by: year
  group_order: descending

# -----------------------------------------------------------------------------
# Social links
# -----------------------------------------------------------------------------

social:
  name: Mohannad Alhanahnah
  email: mohannad.alhanahnah@gmail.com
  github: Mohannadcse
  linkedin: engmohannad
  twitter: malhanahnah
  scholar: https://scholar.google.com/citations?user=OD8hydoAAAAJ&hl=en
  orcid:

# -----------------------------------------------------------------------------
# External links
# -----------------------------------------------------------------------------

external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:

# -----------------------------------------------------------------------------
# Pagination
# -----------------------------------------------------------------------------

pagination:
  enabled: true
  size: 5
  permalink: "/page/:num/"
  title: ":title - page :num"
  limit: 0
  sort_field: "date"
  sort_reverse: true

autopages:
  enabled: true
  categories:
    enabled: false
  collections:
    enabled: false
  tags:
    enabled: false

# -----------------------------------------------------------------------------
# Jekyll Archives (disabled - jekyll-archives-v2 uses different config)
# -----------------------------------------------------------------------------

jekyll-archives-v2:
  enabled: []

# -----------------------------------------------------------------------------
# HTML Compression
# -----------------------------------------------------------------------------

compress_html:
  clippings: all
  comments: all
  endings: all
  blanklines: false
  profile: false

# -----------------------------------------------------------------------------
# Jekyll Minifier
# -----------------------------------------------------------------------------

jekyll-minifier:
  exclude: "robots.txt"
  uglifier_args:
    harmony: true

# -----------------------------------------------------------------------------
# Defaults
# -----------------------------------------------------------------------------

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page
      permalink: /:basename/
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      permalink: /blog/:year/:title/

# -----------------------------------------------------------------------------
# Third party libraries (minimal set)
# -----------------------------------------------------------------------------

third_party_libraries:
  download: false
  jquery:
    integrity:
      js: "sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
    url:
      js: "https://cdn.jsdelivr.net/npm/jquery@{{version}}/dist/jquery.min.js"
    version: "3.6.0"
  mathjax:
    integrity:
      js: "sha256-MASABpB4tYktI2Oitl4t+78w/lyA+D7b/s9GEP0JOGI="
    url:
      js: "https://cdn.jsdelivr.net/npm/mathjax@{{version}}/es5/tex-mml-chtml.js"
    version: "3.2.2"
  mermaid:
    integrity:
      js: "sha256-TtLOdUA8mstPoO6sGvHIGx2ceXrrX4KgIItO06XOn8A="
    url:
      js: "https://cdn.jsdelivr.net/npm/mermaid@{{version}}/dist/mermaid.min.js"
    version: "10.7.0"
